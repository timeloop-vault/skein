<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Skein — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: "Inter", system-ui, sans-serif; background: #0d0e10; color: #e8e6df; overflow: hidden; }
  #root { height: 100vh; width: 100vw; }

  :root {
    --sk-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sk-sans: "Inter", system-ui, sans-serif;
  }

  .sk-dark {
    --bg-0: #0d0e10; --bg-1: #131418; --bg-2: #181a1f; --bg-3: #20232a;
    --line: rgba(255,255,255,0.06); --line-strong: rgba(255,255,255,0.12);
    --fg-0: #e8e6df; --fg-1: #b6b3aa; --fg-2: #7a786f; --fg-3: #4a4944;
    --accent: #c96442;
    --ok: #7aa37f; --warn: #d4a657; --err: #c97163; --waiting: #8a96c9;
    --diff-add: rgba(122,163,127,0.18); --diff-del: rgba(201,113,99,0.16);
  }
  .sk-light {
    --bg-0: #f5f3ee; --bg-1: #faf8f3; --bg-2: #ffffff; --bg-3: #ece9e1;
    --line: rgba(20,18,14,0.07); --line-strong: rgba(20,18,14,0.14);
    --fg-0: #1a1814; --fg-1: #4a4740; --fg-2: #7a766c; --fg-3: #b0aca0;
    --accent: #b8513a;
    --ok: #547f5b; --warn: #a87a2c; --err: #a64f3f; --waiting: #5a6aa0;
    --diff-add: rgba(84,127,91,0.14); --diff-del: rgba(166,79,63,0.12);
  }

  /* density */
  .density-compact { --row-h: 28px; --pad-x: 12px; --gap: 10px; }
  .density-regular { --row-h: 36px; --pad-x: 14px; --gap: 14px; }
  .density-comfy   { --row-h: 44px; --pad-x: 18px; --gap: 18px; }

  .sk-app {
    width: 100%; height: 100%;
    background: var(--bg-0); color: var(--fg-0);
    font-family: var(--sk-sans); font-size: 12px;
    display: flex; flex-direction: column; overflow: hidden;
    letter-spacing: -0.005em;
  }

  /* Title bar */
  .sk-titlebar {
    height: 30px; flex: 0 0 30px;
    display: flex; align-items: center;
    background: var(--bg-0); border-bottom: 1px solid var(--line);
    padding: 0 10px; gap: 10px;
  }
  .sk-traffic { display: flex; gap: 6px; }
  .sk-traffic-light { width: 11px; height: 11px; border-radius: 50%; }
  .sk-traffic-light.close { background: #ed6a5e; }
  .sk-traffic-light.min   { background: #f5bf4f; }
  .sk-traffic-light.max   { background: #62c554; }
  .sk-app-name {
    font-family: var(--sk-mono); font-size: 11px; font-weight: 500;
    color: var(--fg-1); letter-spacing: 0.02em;
  }
  .sk-app-name .dot { color: var(--accent); }

  /* ── Session tab strip (style B — two-line) ── */
  .sk-tabstrip {
    flex: 0 0 48px; height: 48px;
    background: var(--bg-0);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: stretch;
    padding: 0 6px; gap: 1px;
    overflow: hidden;
  }
  .sk-tab {
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 14px; height: 48px;
    color: var(--fg-2); font-size: 12px;
    cursor: pointer; position: relative;
    min-width: 0; max-width: 240px;
    border-left: 1px solid transparent;
    border-right: 1px solid transparent;
    gap: 2px;
  }
  .sk-tab:hover { color: var(--fg-1); background: rgba(255,255,255,0.02); }
  .sk-light .sk-tab:hover { background: rgba(0,0,0,0.02); }
  .sk-tab.active {
    background: var(--bg-1); color: var(--fg-0);
    border-left-color: var(--line); border-right-color: var(--line);
  }
  .sk-tab.active::before {
    content: ""; position: absolute; left: 0; right: 0; top: -1px;
    height: 2px; background: var(--accent);
  }
  .sk-tab .row-1 { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .sk-tab .row-2 {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--sk-mono); font-size: 9.5px; color: var(--fg-3);
    letter-spacing: 0.02em;
  }
  .sk-tab .name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .tab-status { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 6px; }
  .tab-badge {
    background: var(--accent); color: #fff;
    font-size: 9px; font-weight: 600;
    padding: 1px 5px; border-radius: 8px;
    line-height: 1.4; min-width: 14px; text-align: center;
  }
  .sk-tab-newbtn {
    height: 48px; width: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-2); font-family: var(--sk-mono); font-size: 14px;
    border-left: 1px solid var(--line); margin-left: 2px;
    cursor: pointer;
  }
  .sk-tab-newbtn:hover { color: var(--fg-0); background: var(--bg-1); }

  /* Harness chips */
  .h-chip {
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--sk-mono); font-weight: 700; color: #fff;
    border-radius: 3px; flex: 0 0 auto;
  }
  .h-claude   { background: #c96442; }
  .h-opencode { background: #5b8a72; }
  .h-copilot  { background: #4a6b9a; }
  .h-byoh     { background: #8a7a4a; }

  /* Status dots */
  .st-running { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .st-waiting { background: var(--waiting); box-shadow: 0 0 6px var(--waiting); animation: sk-pulse 1.6s ease-in-out infinite; }
  .st-idle    { background: var(--fg-3); }
  .st-error   { background: var(--err); box-shadow: 0 0 6px var(--err); }
  @keyframes sk-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Workspace */
  .sk-workspace { flex: 1; display: flex; min-height: 0; background: var(--bg-1); }

  /* ── Harness column (left side of session) ── */
  .sk-harness-col {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; background: var(--bg-1);
    border-right: 1px solid var(--line);
  }

  /* Sub-tabstrip for harnesses within a session */
  .sk-harness-tabs {
    flex: 0 0 34px; height: 34px;
    display: flex; align-items: stretch;
    padding: 0 6px; gap: 2px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line);
  }
  .sk-harness-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 0 10px;
    border-radius: 5px 5px 0 0;
    color: var(--fg-2); font-size: 11.5px;
    cursor: pointer; position: relative;
    margin-top: 4px; height: 30px;
    border: 1px solid transparent;
    border-bottom: none;
  }
  .sk-harness-tab:hover { color: var(--fg-1); }
  .sk-harness-tab.active {
    background: var(--bg-2); color: var(--fg-0);
    border-color: var(--line);
  }
  .sk-harness-tab.active::after {
    content: ""; position: absolute;
    left: 0; right: 0; bottom: -1px; height: 1px; background: var(--bg-2);
  }
  .sk-harness-tab .ht-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .sk-harness-tab .ht-x {
    color: var(--fg-3); font-size: 12px;
    margin-left: 2px; opacity: 0;
    transition: opacity .12s;
  }
  .sk-harness-tab:hover .ht-x, .sk-harness-tab.active .ht-x { opacity: 0.7; }
  .sk-harness-tab .ht-x:hover { color: var(--fg-0); opacity: 1; }
  .sk-harness-add {
    align-self: center; height: 24px; padding: 0 8px;
    color: var(--fg-3); font-family: var(--sk-mono); font-size: 11px;
    cursor: pointer; border-radius: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .sk-harness-add:hover { color: var(--fg-1); background: var(--bg-2); }

  .sk-harness-meta {
    margin-left: auto; align-self: center;
    font-family: var(--sk-mono); font-size: 10px;
    color: var(--fg-2); padding-right: 8px;
    display: flex; gap: 12px;
  }

  /* Harness content (chat) */
  .sk-harness-body {
    flex: 1; overflow-y: auto; padding: 16px 18px;
    display: flex; flex-direction: column; gap: 14px;
    font-size: 12px; line-height: 1.55;
    scrollbar-width: thin; scrollbar-color: var(--bg-3) transparent;
  }
  .sk-harness-body::-webkit-scrollbar { width: 8px; }
  .sk-harness-body::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }

  /* ── Terminal / TUI render — one canvas per harness flavor ── */
  .sk-term {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 12px 16px;
    font-family: var(--sk-mono);
    font-size: 12px; line-height: 1.5;
    background: var(--bg-1);
    color: var(--fg-1);
    white-space: pre-wrap;
    scrollbar-width: thin; scrollbar-color: var(--bg-3) transparent;
  }
  .sk-term::-webkit-scrollbar { width: 8px; }
  .sk-term::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
  .sk-term .line { display: block; min-height: 1.5em; }
  .sk-term .dim { color: var(--fg-3); }
  .sk-term .muted { color: var(--fg-2); }
  .sk-term .em { color: var(--fg-0); font-weight: 500; }
  .sk-term .accent { color: var(--accent); }
  .sk-term .ok { color: var(--ok); }
  .sk-term .warn { color: var(--warn); }
  .sk-term .err { color: var(--err); }
  .sk-term .info { color: var(--waiting); }
  .sk-term .prompt { color: var(--accent); }
  .sk-term .you { color: var(--fg-0); }
  .sk-term hr {
    border: 0; border-top: 1px dashed var(--line);
    margin: 6px 0;
  }
  .sk-term .blink::after {
    content: "▍"; color: var(--accent);
    animation: sk-pulse 1.1s ease-in-out infinite;
  }
  /* Boxed UI common in TUIs */
  .sk-term .box {
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 6px 10px; margin: 4px 0;
    color: var(--fg-1);
  }
  .sk-term .box.accent { border-color: color-mix(in srgb, var(--accent) 50%, var(--line-strong)); }
  .sk-term .box.warn { border-color: color-mix(in srgb, var(--waiting) 50%, var(--line-strong)); background: color-mix(in srgb, var(--waiting) 6%, transparent); }
  .sk-term .box.err-box { border-color: color-mix(in srgb, var(--err) 55%, var(--line-strong)); background: color-mix(in srgb, var(--err) 7%, transparent); }
  .sk-term .key { color: var(--fg-2); }

  /* Claude Code flavor: boxed header, "●" bullets, accent terracotta */
  .term-claude .header {
    border: 1px solid color-mix(in srgb, #c96442 40%, var(--line));
    border-radius: 6px;
    padding: 8px 12px; margin-bottom: 10px;
    color: var(--fg-0);
  }
  .term-claude .header .name { color: #c96442; font-weight: 600; }
  .term-claude .bullet { color: #c96442; }

  /* opencode flavor: minimalist, bracketed tags */
  .term-opencode .tag { color: #5b8a72; font-weight: 500; }
  .term-opencode .header {
    color: var(--fg-1);
    padding-bottom: 8px; margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .term-opencode .header .name { color: #5b8a72; }

  /* Copilot CLI flavor: bracketed, gh-blue */
  .term-copilot .tag { color: #4a6b9a; font-weight: 500; }
  .term-copilot .header {
    color: var(--fg-1);
    padding-bottom: 6px; margin-bottom: 8px;
  }
  .term-copilot .header .name { color: #4a6b9a; }

  /* Skein BYOH (bare shell) */
  .term-byoh .header { color: var(--fg-2); padding-bottom: 6px; margin-bottom: 8px; }
  .term-byoh .header .name { color: #8a7a4a; }

  /* Shell prompt look (the OUTER shell — your real fish/pwsh) */
  .sk-shell-prompt {
    color: var(--fg-2);
    padding: 4px 0;
  }
  .sk-shell-prompt .ps1-host { color: var(--ok); }
  .sk-shell-prompt .ps1-path { color: var(--waiting); }
  .sk-shell-prompt .ps1-arrow { color: var(--accent); }
  .sk-shell-prompt .ps1-cmd { color: var(--fg-0); }

  /* "no harness running" empty terminal */
  .sk-term-idle {
    flex: 1; padding: 16px;
    font-family: var(--sk-mono);
    font-size: 12px; line-height: 1.6;
    color: var(--fg-2);
    overflow-y: auto;
  }
  .sk-term-idle .quick {
    margin-top: 14px;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
    max-width: 480px;
  }
  .sk-term-idle .quick button {
    text-align: left;
    padding: 8px 10px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 5px;
    color: var(--fg-0);
    font-family: var(--sk-mono); font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
  }
  .sk-term-idle .quick button:hover { border-color: var(--line-strong); background: var(--bg-3); }
  .sk-term-idle .quick button .cmd { color: var(--fg-2); margin-left: auto; }

  .sk-msg-user {
    color: var(--fg-1);
    border-left: 2px solid var(--fg-3);
    padding: 2px 0 2px 10px; font-size: 12px;
  }
  .sk-msg-assistant { color: var(--fg-0); }
  .sk-msg-assistant code { font-family: var(--sk-mono); font-size: 11px; color: var(--fg-1); background: var(--bg-2); padding: 1px 4px; border-radius: 3px; }
  .sk-msg-assistant strong { color: var(--accent); font-weight: 600; }

  .sk-tool {
    font-family: var(--sk-mono); font-size: 10.5px;
    color: var(--fg-2);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 5px 9px;
    display: flex; align-items: center; gap: 8px;
  }
  .sk-tool .name { color: var(--fg-1); }
  .sk-tool .arg  { color: var(--accent); }
  .sk-tool .check { color: var(--ok); margin-left: auto; }

  .sk-permission {
    background: color-mix(in srgb, var(--waiting) 8%, var(--bg-2));
    border: 1px solid color-mix(in srgb, var(--waiting) 35%, var(--line));
    border-radius: 5px; padding: 12px 14px;
    font-size: 11.5px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .sk-permission .head { display: flex; align-items: center; gap: 8px; color: var(--fg-0); font-weight: 500; }
  .sk-permission .head .icon { color: var(--waiting); font-family: var(--sk-mono); font-weight: 700; }
  .sk-permission .cmd {
    font-family: var(--sk-mono); font-size: 10.5px;
    color: var(--fg-1); background: var(--bg-0);
    border-radius: 3px; padding: 6px 8px;
  }
  .sk-permission .actions { display: flex; gap: 6px; }
  .sk-btn {
    font: inherit; font-family: var(--sk-sans); font-size: 11px;
    padding: 5px 10px; border-radius: 4px;
    border: 1px solid var(--line-strong);
    background: var(--bg-2); color: var(--fg-0);
    font-weight: 500; cursor: pointer;
  }
  .sk-btn:hover { background: var(--bg-3); }
  .sk-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sk-btn.primary:hover { filter: brightness(1.08); }
  .sk-btn.ghost { background: transparent; color: var(--fg-1); }
  .sk-btn.ghost:hover { background: var(--bg-3); }

  /* Composer */
  .sk-composer {
    flex: 0 0 auto;
    border-top: 1px solid var(--line);
    padding: 10px 14px 12px; background: var(--bg-1);
  }
  .sk-composer .input-row {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .sk-composer .input-row:focus-within { border-color: var(--line-strong); }
  .sk-composer input {
    background: transparent; border: 0; outline: 0; flex: 1;
    color: var(--fg-0); font: inherit;
    font-family: var(--sk-mono); font-size: 11px;
  }
  .sk-composer input::placeholder { color: var(--fg-3); }
  .sk-composer .hint {
    margin-top: 6px; color: var(--fg-3);
    font-family: var(--sk-mono); font-size: 9.5px; letter-spacing: 0.04em;
    display: flex; gap: 14px;
  }
  .sk-composer .hint .key { color: var(--fg-2); }

  /* ── Right pane (context stack — variation B) ── */
  .sk-right {
    flex: 1.05; display: flex; flex-direction: column;
    background: var(--bg-1); min-width: 0;
  }
  .sk-right-tabs {
    flex: 0 0 38px; height: 38px;
    display: flex; align-items: stretch;
    border-bottom: 1px solid var(--line);
    padding: 0 8px; gap: 1px;
  }
  .sk-right-tab {
    padding: 0 12px;
    display: flex; align-items: center; gap: 6px;
    color: var(--fg-2);
    font-family: var(--sk-mono); font-size: 11px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px; cursor: pointer;
  }
  .sk-right-tab:hover { color: var(--fg-1); }
  .sk-right-tab.active { color: var(--fg-0); border-bottom-color: var(--accent); }
  .sk-right-tab .num { color: var(--fg-3); }
  .sk-right-meta {
    margin-left: auto; align-self: center;
    font-family: var(--sk-mono); font-size: 10px;
    color: var(--fg-2); padding-right: 8px;
    display: flex; gap: 10px; align-items: center;
  }
  .sk-right-meta .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 5px var(--accent);
  }

  /* Context cards stack */
  .sk-context-stack {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; min-height: 0;
  }
  .sk-context-card {
    border-bottom: 1px solid var(--line);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .sk-context-card:last-child { border-bottom: 0; }
  .sk-context-card.h-1 { flex: 1; }
  .sk-context-card.h-2 { flex: 1.7; }
  .sk-context-head {
    flex: 0 0 30px; height: 30px;
    padding: 0 12px;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--sk-mono); font-size: 10.5px;
    color: var(--fg-2);
    background: var(--bg-0);
    border-bottom: 1px solid var(--line);
    cursor: pointer; user-select: none;
  }
  .sk-context-head .label {
    color: var(--fg-1);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 9.5px;
    font-weight: 600;
  }
  .sk-context-head .meta { margin-left: auto; color: var(--fg-3); font-size: 10px; }
  .sk-context-head .live {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok); box-shadow: 0 0 5px var(--ok);
  }
  .sk-context-head .chev { color: var(--fg-3); font-size: 10px; transition: transform .15s; }
  .sk-context-card.collapsed .chev { transform: rotate(-90deg); }
  .sk-context-card.collapsed .sk-context-body { display: none; }
  .sk-context-card.collapsed { flex: 0 0 auto !important; }
  .sk-context-body { flex: 1; overflow: hidden; min-height: 0; display: flex; }

  /* File tree */
  .sk-tree {
    flex: 0 0 180px;
    border-right: 1px solid var(--line);
    padding: 8px 4px;
    font-family: var(--sk-mono); font-size: 11px;
    color: var(--fg-1);
    overflow-y: auto;
    background: var(--bg-1);
    scrollbar-width: thin; scrollbar-color: var(--bg-3) transparent;
  }
  .sk-tree-row {
    display: flex; align-items: center; gap: 6px;
    padding: 2px 8px;
    border-radius: 3px; height: 20px;
    cursor: pointer;
  }
  .sk-tree-row:hover { background: rgba(255,255,255,0.04); }
  .sk-light .sk-tree-row:hover { background: rgba(0,0,0,0.04); }
  .sk-tree-row.dir { color: var(--fg-1); }
  .sk-tree-row.file { color: var(--fg-2); }
  .sk-tree-row.touched { color: var(--fg-0); }
  .sk-tree-row.touched .badge { margin-left: auto; font-size: 9px; color: var(--ok); }
  .sk-tree-row.active { background: var(--bg-3); color: var(--fg-0); }
  .sk-tree-row .indent { display: inline-block; width: 12px; }
  .sk-tree-row .icon { color: var(--fg-3); width: 12px; }

  /* Code/diff editor */
  .sk-editor {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; background: var(--bg-1); min-width: 0;
  }
  .sk-editor-head {
    flex: 0 0 28px; height: 28px;
    display: flex; align-items: center;
    padding: 0 12px;
    border-bottom: 1px solid var(--line);
    font-family: var(--sk-mono); font-size: 10.5px;
    color: var(--fg-2); gap: 10px;
  }
  .sk-editor-head .path { color: var(--fg-1); }
  .sk-editor-head .delta-add { color: var(--ok); margin-left: auto; }
  .sk-editor-head .delta-del { color: var(--err); }

  .sk-code {
    flex: 1; overflow-y: auto;
    font-family: var(--sk-mono); font-size: 11px;
    line-height: 1.55; padding: 8px 0;
    scrollbar-width: thin; scrollbar-color: var(--bg-3) transparent;
  }
  .sk-line { display: flex; padding: 0 12px 0 0; min-height: 17px; }
  .sk-line.add { background: var(--diff-add); }
  .sk-line.del { background: var(--diff-del); }
  .sk-line .gutter { flex: 0 0 56px; display: flex; color: var(--fg-3); font-size: 10px; user-select: none; }
  .sk-line .gutter .ln { flex: 1; text-align: right; padding: 0 6px; }
  .sk-line .marker { flex: 0 0 14px; text-align: center; color: var(--fg-3); }
  .sk-line.add .marker { color: var(--ok); }
  .sk-line.del .marker { color: var(--err); }
  .sk-line .src { white-space: pre; }
  .tk-key { color: #c97163; }
  .tk-fn  { color: #d4a657; }
  .tk-str { color: #7aa37f; }
  .tk-num { color: #b08bd4; }
  .tk-com { color: var(--fg-3); }
  .sk-light .tk-key { color: #a64f3f; }
  .sk-light .tk-fn  { color: #8a6420; }
  .sk-light .tk-str { color: #4a7050; }
  .sk-light .tk-com { color: #9b9789; }

  /* Plan/todo */
  .sk-todo {
    padding: 8px 12px;
    font-family: var(--sk-mono); font-size: 11px;
    color: var(--fg-1);
    display: flex; flex-direction: column; gap: 4px;
    overflow-y: auto; flex: 1;
  }
  .sk-todo .row { display: flex; align-items: center; gap: 8px; }
  .sk-todo .box {
    width: 11px; height: 11px;
    border: 1px solid var(--line-strong); border-radius: 2px;
    flex: 0 0 11px; display: flex; align-items: center; justify-content: center;
    font-size: 9px;
  }
  .sk-todo .row.done .box { background: var(--ok); border-color: var(--ok); color: #fff; }
  .sk-todo .row.done { color: var(--fg-3); text-decoration: line-through; }
  .sk-todo .row.now .box { border-color: var(--accent); color: var(--accent); }
  .sk-todo .row.now { color: var(--fg-0); font-weight: 500; }
  .sk-todo .by {
    margin-left: auto; font-size: 9px; color: var(--fg-3);
    display: flex; align-items: center; gap: 4px;
  }

  /* Activity feed */
  .sk-activity {
    padding: 6px 12px; flex: 1; overflow-y: auto;
    font-family: var(--sk-mono); font-size: 10.5px;
    color: var(--fg-2); display: flex; flex-direction: column; gap: 3px;
  }
  .sk-activity .a-row { display: flex; gap: 8px; align-items: baseline; padding: 2px 0; }
  .sk-activity .a-time { color: var(--fg-3); flex: 0 0 50px; }
  .sk-activity .a-by   { flex: 0 0 24px; }
  .sk-activity .a-msg  { flex: 1; }
  .sk-activity .a-msg .arg { color: var(--accent); }
  .sk-activity .a-msg .ok { color: var(--ok); }

  /* Status bar (bottom) */
  .sk-statusbar {
    flex: 0 0 24px; height: 24px;
    display: flex; align-items: center;
    background: var(--bg-0);
    border-top: 1px solid var(--line);
    padding: 0 10px; gap: 14px;
    font-family: var(--sk-mono); font-size: 10px;
    color: var(--fg-2); letter-spacing: 0.02em;
  }
  .sk-statusbar .seg { display: flex; align-items: center; gap: 6px; }
  .sk-statusbar .seg.urgent { color: var(--accent); cursor: pointer; }
  .sk-statusbar .seg.urgent:hover { text-decoration: underline; }
  .sk-statusbar .spacer { flex: 1; }
  .sk-statusbar .dot-tiny { width: 5px; height: 5px; border-radius: 50%; }

  /* Empty state for new harness */
  .sk-empty-harness {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px; gap: 24px;
  }
  .sk-empty-harness h3 {
    font-size: 14px; font-weight: 500;
    color: var(--fg-0); margin: 0;
    font-family: var(--sk-mono); letter-spacing: -0.01em;
  }
  .sk-empty-harness p {
    color: var(--fg-2); font-size: 12px; max-width: 360px; text-align: center;
    margin: 0; line-height: 1.6;
  }
  .sk-harness-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 320px; }
  .sk-harness-card {
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--bg-1);
    cursor: pointer;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color .12s, background .12s;
  }
  .sk-harness-card:hover { border-color: var(--line-strong); background: var(--bg-2); }
  .sk-harness-card .head { display: flex; align-items: center; gap: 8px; }
  .sk-harness-card .h-name { font-size: 12px; font-weight: 500; color: var(--fg-0); }
  .sk-harness-card .h-desc { font-size: 10.5px; color: var(--fg-2); line-height: 1.5; font-family: var(--sk-mono); }

  /* Tweaks panel overrides — make it usable on dark backgrounds */
  .sk-light .twk-panel { /* default panel works for light, leave alone */ }
  .sk-dark { /* nothing */ }

  /* ── Full-pane variants for right pane (Files/Diff/Plan) ── */
  .sk-fullpane {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    background: var(--bg-1);
  }
  .sk-fullpane-head {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 12px;
    background: var(--bg-0);
  }
  .sk-fullpane-head .title {
    font-family: var(--sk-mono);
    font-size: 12px;
    color: var(--fg-0);
  }
  .sk-fullpane-head .meta {
    font-family: var(--sk-mono);
    font-size: 10.5px;
    color: var(--fg-2);
  }
  .sk-fullpane-body {
    flex: 1; min-height: 0;
    overflow: auto;
  }
  .sk-fullpane-files { display: grid; grid-template-columns: 220px 1fr; }
  .sk-fullpane-files .sk-tree { border-right: 1px solid var(--line); }
  .sk-fullpane-diff .sk-diff-editor { border: 0; }
  .sk-fullpane-plan { padding: 18px; display: flex; flex-direction: column; gap: 24px; }
  .sk-fullpane-section .sec-label {
    font-family: var(--sk-mono);
    font-size: 10px;
    color: var(--fg-2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  /* ── New session dialog (modal) ── */
  .sk-modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
  }
  .sk-light .sk-modal-bg { background: rgba(20,18,14,0.32); }
  .sk-modal {
    background: var(--bg-1);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    width: 560px;
    max-width: 92vw;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .sk-modal-head {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--line);
  }
  .sk-modal-head h2 {
    margin: 0;
    font-size: 14px; font-weight: 500;
    color: var(--fg-0);
    letter-spacing: -0.01em;
  }
  .sk-modal-head .sub {
    margin-top: 4px;
    font-family: var(--sk-mono);
    font-size: 10.5px;
    color: var(--fg-2);
  }
  .sk-modal-body {
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .sk-field { display: flex; flex-direction: column; gap: 5px; }
  .sk-field label {
    font-family: var(--sk-mono); font-size: 10px;
    color: var(--fg-2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .sk-input, .sk-select {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 8px 10px;
    color: var(--fg-0);
    font: inherit; font-family: var(--sk-mono); font-size: 12px;
    outline: none;
  }
  .sk-input:focus, .sk-select:focus { border-color: var(--accent); }
  .sk-radio-row { display: flex; gap: 6px; }
  .sk-radio-card {
    flex: 1; padding: 10px;
    border: 1px solid var(--line);
    border-radius: 5px;
    background: var(--bg-2);
    cursor: pointer;
    display: flex; flex-direction: column; gap: 4px;
    transition: border-color .12s, background .12s;
  }
  .sk-radio-card:hover { border-color: var(--line-strong); }
  .sk-radio-card.selected {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 8%, var(--bg-2));
  }
  .sk-radio-card .top { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--fg-0); font-weight: 500; }
  .sk-radio-card .desc { font-family: var(--sk-mono); font-size: 9.5px; color: var(--fg-2); }
  .sk-modal-foot {
    padding: 12px 20px;
    border-top: 1px solid var(--line);
    display: flex; gap: 8px; justify-content: flex-end;
    background: var(--bg-0);
  }

  /* ── Empty state (first run) ── */
  .sk-empty {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg-1);
    padding: 40px;
    gap: 22px;
  }
  .sk-empty .glyph {
    font-family: var(--sk-mono);
    font-size: 56px;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .sk-empty h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 500;
    color: var(--fg-0);
    letter-spacing: -0.02em;
  }
  .sk-empty .lede {
    color: var(--fg-1);
    max-width: 520px;
    text-align: center;
    line-height: 1.6;
    font-size: 13px;
  }
  .sk-empty .hint-list {
    display: flex; flex-direction: column; gap: 6px;
    font-family: var(--sk-mono); font-size: 11px;
    color: var(--fg-2);
    margin-top: 8px;
  }
  .sk-empty .hint-list .row { display: flex; gap: 14px; align-items: baseline; }
  .sk-empty .hint-list .kbd {
    color: var(--fg-1);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 10px;
  }
  .sk-empty .start-btn {
    margin-top: 4px;
    padding: 10px 18px;
    background: var(--accent); color: #fff;
    font-family: var(--sk-sans); font-size: 12px; font-weight: 500;
    border: 0; border-radius: 6px;
    cursor: pointer;
  }
  .sk-empty .start-btn:hover { filter: brightness(1.08); }

  /* ── Scripted tour ── */
  .sk-tour-launch {
    margin-left: auto;
    margin-right: 12px;
    background: color-mix(in srgb, var(--accent) 90%, transparent);
    color: #fff;
    border: 0;
    border-radius: 4px;
    padding: 4px 10px;
    font-family: var(--sk-sans);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }
  .sk-tour-launch:hover { filter: brightness(1.1); }

  .sk-tour-overlay {
    position: fixed; inset: 0;
    z-index: 200;
    pointer-events: none; /* let underlying UI breathe; callout re-enables */
  }
  .sk-tour-scrim {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(2px);
    pointer-events: auto;
  }
  /* Spotlight: a giant outset box-shadow becomes the dimmer everywhere
     except the cut-out rectangle, with a soft accent ring on the edge. */
  .sk-tour-spotlight {
    position: absolute;
    border-radius: 8px;
    box-shadow:
      0 0 0 9999px rgba(0,0,0,0.45),
      0 0 0 2px var(--accent),
      0 0 28px 4px color-mix(in srgb, var(--accent) 50%, transparent);
    pointer-events: none;
    transition: top .3s ease, left .3s ease, width .3s ease, height .3s ease;
    animation: sk-tour-pulse 2.4s ease-in-out infinite;
  }
  @keyframes sk-tour-pulse {
    0%, 100% { box-shadow: 0 0 0 9999px rgba(0,0,0,0.45), 0 0 0 2px var(--accent), 0 0 28px 4px color-mix(in srgb, var(--accent) 50%, transparent); }
    50%      { box-shadow: 0 0 0 9999px rgba(0,0,0,0.45), 0 0 0 2px var(--accent), 0 0 38px 8px color-mix(in srgb, var(--accent) 70%, transparent); }
  }

  .sk-tour-callout {
    position: absolute;
    background: var(--bg-1);
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    box-shadow: 0 18px 60px rgba(0,0,0,0.45);
    padding: 14px 16px 12px;
    pointer-events: auto;
    transition: top .3s ease, left .3s ease;
    display: flex; flex-direction: column; gap: 8px;
  }
  .sk-tour-callout .head {
    display: flex; align-items: center; gap: 10px;
  }
  .sk-tour-callout .step {
    font-family: var(--sk-mono);
    font-size: 10px;
    color: var(--fg-2);
    letter-spacing: 0.06em;
  }
  .sk-tour-callout .dot-row { display: flex; gap: 4px; flex: 1; justify-content: flex-end; }
  .sk-tour-callout .dot-row .d {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--line-strong);
  }
  .sk-tour-callout .dot-row .d.past { background: var(--fg-3); }
  .sk-tour-callout .dot-row .d.on   { background: var(--accent); width: 14px; border-radius: 3px; }
  .sk-tour-callout .title {
    font-size: 14px;
    font-weight: 500;
    color: var(--fg-0);
    letter-spacing: -0.01em;
  }
  .sk-tour-callout .body {
    font-size: 12px;
    color: var(--fg-1);
    line-height: 1.55;
  }
  .sk-tour-callout .body em { font-style: normal; color: var(--fg-0); font-weight: 500; }
  .sk-tour-callout .body code {
    font-family: var(--sk-mono);
    font-size: 11px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 1px 5px;
    color: var(--fg-0);
  }
  .sk-tour-callout .foot {
    display: flex; align-items: center; gap: 6px;
    margin-top: 4px;
  }
  .sk-tour-callout .foot .spacer { flex: 1; }
  .sk-tour-callout .foot button {
    font-family: var(--sk-sans);
    font-size: 11px;
    border-radius: 5px;
    padding: 5px 10px;
    cursor: pointer;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--fg-1);
  }
  .sk-tour-callout .foot button:hover { border-color: var(--line-strong); color: var(--fg-0); }
  .sk-tour-callout .foot button.ghost { background: transparent; border-color: transparent; color: var(--fg-2); }
  .sk-tour-callout .foot button.ghost:hover { color: var(--fg-0); background: var(--bg-2); }
  .sk-tour-callout .foot button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .sk-tour-callout .foot button.primary:hover { filter: brightness(1.08); }

  .sk-toast {
    position: absolute; bottom: 32px; right: 16px;
    background: var(--bg-2);
    border: 1px solid color-mix(in srgb, var(--waiting) 50%, var(--line));
    border-left: 3px solid var(--waiting);
    border-radius: 5px;
    padding: 10px 14px 10px 12px;
    display: flex; align-items: center; gap: 10px;
    font-size: 11.5px; color: var(--fg-0);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    cursor: pointer;
    animation: toast-in .25s ease-out;
  }
  @keyframes toast-in {
    from { transform: translateY(8px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="skein-proto.jsx"></script>
</body>
</html>

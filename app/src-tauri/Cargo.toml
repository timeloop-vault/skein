[package]
name = "skein-app"
version = "0.0.0-dev"
description = "Skein — agent-first IDE prototype"
authors = ["timeloop-vault"]
edition = "2024"
rust-version = "1.85"
license = "MIT"

[lib]
name = "skein_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
too_many_lines = "allow"
